<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>series-select</title>
        <style>
            /* Color tokens (kept from original) */
            @media (prefers-color-scheme: light) {
                :root {
                    --radius: 0.625rem;
                    --background: oklch(1 0 0);
                    --foreground: oklch(0.145 0 0);
                    --card: oklch(1 0 0);
                    --card-foreground: oklch(0.145 0 0);
                    --popover: oklch(1 0 0);
                    --popover-foreground: oklch(0.145 0 0);
                    --primary: oklch(0.205 0 0);
                    --primary-foreground: oklch(0.985 0 0);
                    --secondary: oklch(0.97 0 0);
                    --secondary-foreground: oklch(0.205 0 0);
                    --muted: oklch(0.97 0 0);
                    --muted-foreground: oklch(0.556 0 0);
                    --accent: oklch(0.97 0 0);
                    --accent-foreground: oklch(0.205 0 0);
                    --destructive: oklch(0.631 0.2357 17.99);
                    --border: oklch(0.922 0 0);
                    --input: oklch(0.922 0 0);
                    --ring: oklch(0.708 0 0);
                }
            }

            @media (prefers-color-scheme: dark) {
                :root {
                    --background: oklch(0.145 0 0);
                    --foreground: oklch(0.985 0 0);
                    --card: oklch(0.205 0 0);
                    --card-foreground: oklch(0.985 0 0);
                    --popover: oklch(0.205 0 0);
                    --popover-foreground: oklch(0.985 0 0);
                    --primary: oklch(0.922 0 0);
                    --primary-foreground: oklch(0.205 0 0);
                    --secondary: oklch(0.269 0 0);
                    --secondary-foreground: oklch(0.985 0 0);
                    --muted: oklch(0.269 0 0);
                    --muted-foreground: oklch(0.708 0 0);
                    --accent: oklch(0.269 0 0);
                    --accent-foreground: oklch(0.985 0 0);
                    --destructive: oklch(0.631 0.2357 17.99);
                    --border: oklch(1 0 0 / 10%);
                    --input: oklch(1 0 0 / 15%);
                    --ring: oklch(0.556 0 0);
                }
            }

            /* Shadcn-like component styles (compact, accessible) */
            :root {
                --radius: 0.625rem;
                --gap-sm: 0.5rem;
                --gap-xs: 0.25rem;
            }

            body {
                background: var(--background);
                color: var(--foreground);
                font-family: Inter, Arial, sans-serif;
                margin: 0;
                padding: 2rem 1rem;
            }

            .search-container {
                margin-bottom: 0.75rem;
            }

            .search-input {
                width: 100%;
                padding: 0.5rem 0.75rem;
                border-radius: 0.5rem;
                border: 1px solid var(--border);
                background: transparent;
                color: inherit;
            }

            .search-input::placeholder {
                color: var(--muted-foreground);
            }

            .no-results {
                padding: 0.5rem;
                color: var(--muted-foreground);
                font-size: 0.95rem;
            }

            .container {
                max-width: 640px;
                margin: 0 auto;
                padding: 1.25rem;
                background: var(--card);
                color: var(--card-foreground);
                border-radius: var(--radius);
                border: 1px solid var(--border);
            }

            .heading {
                font-size: 1.25rem;
                margin-bottom: 0.75rem;
                font-weight: 600;
            }

            .series-list {
                position: relative;
                margin-bottom: 1.25rem;
                display: flex;
                flex-direction: column;
                max-height: 70vh;
                overflow: auto;

                /* Firefox */
                scrollbar-width: thin;
                scrollbar-color: var(--input) transparent;
            }

            /* WebKit (Chrome, Edge, Safari) */
            .series-list::-webkit-scrollbar {
                width: 10px;
                height: 10px;
            }
            .series-list::-webkit-scrollbar-track {
                background: transparent;
            }
            .series-list::-webkit-scrollbar-thumb {
                background: var(--input);
                border-radius: 9999px;
                border: 2px solid transparent;
                background-clip: padding-box;
            }
            .series-list::-webkit-scrollbar-thumb:hover {
                filter: brightness(0.95);
            }

            .series-item,
            .checkbox-label {
                display: flex;
                align-items: center;
                gap: var(--gap-sm);
                padding: 0.25rem;
                border-radius: 0.5rem;
                cursor: pointer;
                color: var(--card-foreground);
            }

            .series-item:hover,
            .checkbox-label:hover {
                background: var(--input);
            }

            /* Row layout so toggle sits to the right */
            .series-row {
                display: flex;
                align-items: center;
                justify-content: space-between;
                gap: 0.5rem;
                width: 100%;
            }

            .toggle-btn {
                background: transparent;
                border: none;
                color: var(--muted-foreground);
                padding: 0.25rem;
                border-radius: 0.375rem;
                cursor: pointer;
                display: inline-flex;
                align-items: center;
                justify-content: center;
            }

            .toggle-icon {
                display: inline-block;
                transition: transform 0.15s ease;
                transform-origin: center;
            }

            .toggle-btn[aria-expanded="true"] .toggle-icon {
                transform: rotate(90deg);
                color: var(--primary);
            }

            .series-characters {
                max-height: 0;
                overflow: hidden;
                transition:
                    max-height 0.2s ease,
                    opacity 0.15s ease;
                opacity: 0;
                padding-left: 0.5rem;
            }

            .series-characters.open {
                opacity: 1;
                max-height: 400px;
            }

            .popover-panel {
                position: absolute;
                left: 0;
                background: var(--card);
                border: 1px solid var(--border);
                box-shadow: 0 10px 30px rgba(0, 0, 0, 0.12);
                border-radius: 0.5rem;
                padding: 0.5rem;
                z-index: 999;
                max-height: 45vh;
                overflow: auto;
            }

            .characters-list {
                margin: 0 0 0 1.1rem;
                padding: 0;
                list-style: disc;
                color: var(--card-foreground);
            }

            .character-item {
                padding: 0.125rem 0;
                font-size: 0.95rem;
                color: var(--muted-foreground);
            }

            .character-link {
                color: var(--muted-foreground);
                text-decoration: none;
            }

            .character-link:hover,
            .character-link:focus {
                color: var(--primary);
                text-decoration: underline;
            }

            .checkbox {
                width: 1rem;
                height: 1rem;
                accent-color: var(--primary);
                border-radius: 0.25rem;
            }

            .checkbox:focus-visible {
                outline: none;
                box-shadow: 0 0 0 4px rgba(0, 0, 0, 0.06);
                border-color: var(--primary);
            }

            .label-text,
            .series-name {
                user-select: none;
            }

            .btn {
                padding: 0.5rem 0.875rem;
                border-radius: var(--radius);
                border: 1px solid transparent;
                cursor: pointer;
                font-weight: 500;
                display: inline-flex;
                align-items: center;
                gap: 0.5rem;
            }

            .btn-primary {
                background: var(--primary);
                color: var(--primary-foreground);
            }

            .btn-primary:hover {
                filter: brightness(0.95);
            }

            .muted {
                color: var(--muted-foreground);
                font-size: 0.9rem;
            }
        </style>
        <script>
            async function fetchData() {
                try {
                    const [seriesResponse, visibleResponse] = await Promise.all([fetch("/sn0w/series"), fetch("/sn0w/visible_series")]);
                    const seriesData = await seriesResponse.json();
                    const visibleData = await visibleResponse.json();
                    return { seriesData, visibleData: visibleData.visible_series || [] };
                } catch (error) {
                    console.error("Error fetching data:", error);
                    return { seriesData: [], visibleData: [] };
                }
            }

            function renderCheckboxes(seriesData, visibleData, filter = "") {
                const seriesList = document.getElementById("seriesList");
                seriesList.innerHTML = "";
                const normalizedFilter = filter.trim().toLowerCase();
                const filtered = seriesData.filter((s) => s.series.toLowerCase().includes(normalizedFilter));

                if (filtered.length === 0) {
                    const empty = document.createElement("div");
                    empty.className = "no-results";
                    empty.textContent = "No series match your search.";
                    seriesList.appendChild(empty);
                    updateSelectAllState();
                    return;
                }

                filtered.forEach((series, idx) => {
                    const label = document.createElement("label");
                    label.className = "series-item";

                    const checkbox = document.createElement("input");
                    checkbox.type = "checkbox";
                    checkbox.className = "checkbox";
                    checkbox.value = series.series;
                    // If visibleData is empty, default to checked (show all)
                    const shouldCheck = Array.isArray(visibleData) && visibleData.length > 0 ? visibleData.includes(series.series) : true;
                    checkbox.checked = shouldCheck;
                    checkbox.setAttribute("aria-label", series.series);

                    const span = document.createElement("span");
                    span.className = "series-name";
                    span.textContent = `${series.series} (${series.characters.length} character${series.characters.length !== 1 ? "s" : ""})`;

                    label.appendChild(checkbox);
                    label.appendChild(span);

                    // Wrapper row: label on the left, toggle on the right
                    const row = document.createElement("div");
                    row.className = "series-row";
                    row.appendChild(label);

                    // Toggle button to view characters
                    const toggleBtn = document.createElement("button");
                    toggleBtn.type = "button";
                    toggleBtn.className = "toggle-btn";
                    const detailsId = `series-characters-${idx}-${Math.random().toString(36).slice(2, 6)}`;
                    toggleBtn.setAttribute("aria-expanded", "false");
                    toggleBtn.setAttribute("aria-controls", detailsId);
                    toggleBtn.title = "View characters";
                    const icon = document.createElement("span");
                    icon.className = "toggle-icon";
                    icon.textContent = "▸";
                    toggleBtn.appendChild(icon);

                    row.appendChild(toggleBtn);
                    seriesList.appendChild(row);

                    // Toggle behavior: open a floating popover anchored to the row so characters are always visible
                    toggleBtn.addEventListener("click", (e) => {
                        e.stopPropagation();
                        const isExpanded = toggleBtn.getAttribute("aria-expanded") === "true";

                        // Close any existing popover
                        closePopover();

                        if (isExpanded) {
                            // Toggling off handled by closePopover
                            return;
                        }

                        // Open new popover
                        toggleBtn.setAttribute("aria-expanded", "true");

                        const pop = document.createElement("div");
                        pop.id = "seriesPopover";
                        pop.className = "popover-panel";
                        pop.setAttribute("role", "dialog");
                        pop.setAttribute("aria-modal", "false");

                        const ul = document.createElement("ul");
                        ul.className = "characters-list";
                        (series.characters || []).forEach((ch) => {
                            const li = document.createElement("li");
                            li.className = "character-item";

                            const a = document.createElement("a");
                            a.className = "character-link";
                            const tagName = encodeURIComponent(ch).replace(/%20/g, "_");
                            a.href = `https://danbooru.donmai.us/posts?tags=${tagName}+solo`;
                            a.textContent = ch;
                            a.target = "_blank";
                            a.rel = "noopener noreferrer";
                            a.title = `Search ${ch} on Danbooru`;

                            li.appendChild(a);
                            ul.appendChild(li);
                        });

                        pop.appendChild(ul);

                        // Append and position relative to the list container
                        seriesList.appendChild(pop);
                        const top = row.offsetTop + row.offsetHeight;
                        pop.style.position = "absolute";
                        pop.style.left = "0";
                        pop.style.top = top + "px";
                        pop.style.minWidth = "200px";
                        pop.style.width = "100%";
                        pop.style.zIndex = "999";
                        pop.scrollIntoView({ behavior: "smooth", block: "nearest" });

                        // focus for accessibility
                        pop.tabIndex = -1;
                        pop.focus();
                    });
                });

                updateSelectAllState();
            }

            let ALL_SERIES = [];
            let VISIBLE_SERIES = [];

            function closePopover() {
                const pop = document.getElementById("seriesPopover");
                if (pop) pop.remove();
                // reset any toggle buttons
                document.querySelectorAll('.toggle-btn[aria-expanded="true"]').forEach((btn) => btn.setAttribute("aria-expanded", "false"));
            }

            // Close popover when clicking outside
            document.addEventListener("click", (e) => {
                if (!e.target.closest(".popover-panel") && !e.target.closest(".toggle-btn")) {
                    closePopover();
                }
            });

            // Close popover on ESC
            document.addEventListener("keydown", (e) => {
                if (e.key === "Escape") closePopover();
            });

            function updateSelectAllState() {
                const selectAll = document.getElementById("selectAll");
                const checkboxes = document.querySelectorAll("#seriesList .checkbox");
                if (checkboxes.length === 0) {
                    selectAll.checked = false;
                    selectAll.indeterminate = false;
                    return;
                }
                const checked = Array.from(checkboxes).every((cb) => cb.checked);
                const noneChecked = Array.from(checkboxes).every((cb) => !cb.checked);
                selectAll.checked = checked;
                selectAll.indeterminate = !checked && !noneChecked;
            }

            function setupSelectAll() {
                const selectAll = document.getElementById("selectAll");

                selectAll.addEventListener("change", () => {
                    const checkboxes = document.querySelectorAll("#seriesList .checkbox");
                    checkboxes.forEach((cb) => (cb.checked = selectAll.checked));
                });

                document.getElementById("seriesList").addEventListener("change", () => {
                    updateSelectAllState();
                });
            }

            function setupSearch() {
                const input = document.getElementById("seriesSearch");
                if (!input) return;
                let last = "";
                input.addEventListener("input", (e) => {
                    const value = e.target.value || "";
                    if (value === last) return;
                    last = value;
                    renderCheckboxes(ALL_SERIES, VISIBLE_SERIES, value);
                });
            }

            async function submitVisibleSeries() {
                const checkboxes = document.querySelectorAll("#seriesList .checkbox:checked");
                const visibleSeries = Array.from(checkboxes).map((cb) => cb.value);

                try {
                    const response = await fetch("/sn0w/visible_series", {
                        method: "POST",
                        headers: {
                            "Content-Type": "application/json",
                        },
                        body: JSON.stringify({ visible_series: visibleSeries }),
                    });
                    if (response.ok) {
                        alert("Visible series updated successfully!");
                    } else {
                        alert("Error updating visible series.");
                    }
                } catch (error) {
                    console.error("Error submitting data:", error);
                    alert("Error submitting data.");
                }
            }

            document.addEventListener("DOMContentLoaded", async () => {
                const { seriesData, visibleData } = await fetchData();
                ALL_SERIES = seriesData || [];
                VISIBLE_SERIES = visibleData || [];
                renderCheckboxes(ALL_SERIES, VISIBLE_SERIES);
                setupSelectAll();
                setupSearch();

                document.getElementById("submit").addEventListener("click", submitVisibleSeries);
            });
        </script>
    </head>
    <body>
        <div id="root" class="container" role="region" aria-labelledby="series-heading">
            <h1 id="series-heading" class="heading">Select Visible Series</h1>
            <div class="search-container">
                <input id="seriesSearch" class="search-input" type="search" placeholder="Search series..." aria-label="Search series" />
            </div>
            <label class="checkbox-label" for="selectAll">
                <input type="checkbox" id="selectAll" class="checkbox" />
                <span class="label-text">Select All</span>
            </label>
            <div id="seriesList" class="series-list" aria-live="polite" aria-label="Series list">
                <!-- Series checkboxes will be populated here -->
            </div>
            <button id="submit" class="btn btn-primary" type="button">Submit</button>
        </div>
    </body>
</html>
